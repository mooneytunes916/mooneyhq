<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snake | Mooney</title>
<meta name="description" content="A small snake game. Easter egg." />
<link rel="stylesheet" href="/style.css" />
<style>
  .game-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 1em 0 2em;
  }
  .game-meta {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    margin-bottom: 0.6em;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mute);
    font-variant-numeric: tabular-nums;
  }
  .game-meta strong {
    color: var(--text);
    font-weight: 600;
  }
  #board {
    background: var(--bg-tint);
    border: 1px solid var(--rule);
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%;
    height: auto;
  }
  .game-status {
    margin-top: 1em;
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    color: var(--text-soft);
    text-align: center;
    min-height: 1.6em;
  }
  .game-status .hint {
    color: var(--text-mute);
    font-size: 0.84rem;
  }
  .game-controls {
    margin-top: 1.2em;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    color: var(--text-mute);
    text-align: center;
    letter-spacing: 0.04em;
  }
  .game-controls kbd {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 0.78rem;
    background: var(--bg-tint);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 1px 6px;
    margin: 0 1px;
    color: var(--text-soft);
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="/" class="brand">Mooney</a>
  <a href="/about/">About</a>
  <a href="/now/">Now</a>
  <a href="/principles/">Principles</a>
  <a href="/uses/">Uses</a>
</nav>

<h2>Snake</h2>

<p>You found the easter egg. The site is mostly serious. This is the unserious page.</p>

<div class="game-wrap">
  <div class="game-meta">
    <div>Score: <strong id="score">0</strong></div>
    <div>Best: <strong id="best">0</strong></div>
  </div>
  <canvas id="board" width="480" height="480"></canvas>
  <div class="game-status" id="status">Press any arrow key to start.</div>
  <div class="game-controls">
    Move: <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd>
    &nbsp;&middot;&nbsp;
    Or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>
    &nbsp;&middot;&nbsp;
    Restart: <kbd>R</kbd>
  </div>
</div>

<footer>© Jonathon Mooney &nbsp;·&nbsp; <a href="/">home</a></footer>

<script>
(function() {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const statusEl = document.getElementById('status');

  const GRID = 20;
  const CELL = canvas.width / GRID;

  // Read CSS variables for theming
  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  function colors() {
    return {
      bg: cssVar('--bg-tint'),
      snake: cssVar('--text'),
      food: cssVar('--accent'),
      grid: cssVar('--rule'),
    };
  }

  let snake, dir, nextDir, food, score, best, running, dead, tickId;

  best = parseInt(localStorage.getItem('mooney_snake_best') || '0', 10);
  bestEl.textContent = best;

  function reset() {
    snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    dir = {x: 1, y: 0};
    nextDir = dir;
    score = 0;
    scoreEl.textContent = score;
    placeFood();
    dead = false;
    running = false;
    draw();
    statusEl.innerHTML = 'Press any arrow key to start. <span class="hint">Press R to restart.</span>';
  }

  function placeFood() {
    while (true) {
      const fx = Math.floor(Math.random() * GRID);
      const fy = Math.floor(Math.random() * GRID);
      if (!snake.some(s => s.x === fx && s.y === fy)) {
        food = {x: fx, y: fy};
        return;
      }
    }
  }

  function tick() {
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      die();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('mooney_snake_best', best);
      }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function die() {
    dead = true;
    running = false;
    clearInterval(tickId);
    statusEl.innerHTML = `You died. Score: <strong>${score}</strong>. <span class="hint">Press R or any arrow to play again.</span>`;
  }

  function draw() {
    const c = colors();
    ctx.fillStyle = c.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Snake
    ctx.fillStyle = c.snake;
    snake.forEach((seg, i) => {
      ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
    });

    // Food
    ctx.fillStyle = c.food;
    ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
  }

  function start() {
    if (running) return;
    running = true;
    statusEl.textContent = '';
    tickId = setInterval(tick, 110);
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'r') { reset(); return; }
    let newDir = null;
    if (k === 'arrowup' || k === 'w')    newDir = {x: 0, y: -1};
    if (k === 'arrowdown' || k === 's')  newDir = {x: 0, y: 1};
    if (k === 'arrowleft' || k === 'a')  newDir = {x: -1, y: 0};
    if (k === 'arrowright' || k === 'd') newDir = {x: 1, y: 0};
    if (!newDir) return;
    e.preventDefault();
    // Prevent 180° reversal
    if (dir.x + newDir.x === 0 && dir.y + newDir.y === 0) return;
    nextDir = newDir;
    if (dead) { reset(); start(); return; }
    if (!running) start();
  });

  // Mobile touch controls: swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStart = {x: t.clientX, y: t.clientY};
  });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    let newDir;
    if (Math.abs(dx) > Math.abs(dy)) {
      newDir = dx > 0 ? {x: 1, y: 0} : {x: -1, y: 0};
    } else {
      newDir = dy > 0 ? {x: 0, y: 1} : {x: 0, y: -1};
    }
    if (dir.x + newDir.x === 0 && dir.y + newDir.y === 0) return;
    nextDir = newDir;
    if (dead) { reset(); start(); return; }
    if (!running) start();
    touchStart = null;
  });

  reset();
})();
</script>

</body>
</html>
